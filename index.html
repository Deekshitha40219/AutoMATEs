<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<h2>Transfer</h2>
<input id="sender" placeholder="Sender"><br>
<input id="receiver" placeholder="Receiver"><br>
<input id="amount" placeholder="Amount"><br>
<button onclick="transfer()">Transfer</button>

<script>
function login() {
    fetch("http://localhost:4567/login", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "username=" + username.value + "&password=" + password.value
    })
    .then(res => res.text())
    .then(data => alert(data));
}

function transfer() {
    fetch("http://localhost:4567/transfer", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "sender=" + sender.value + "&receiver=" + receiver.value + "&amount=" + amount.value
    })
    .then(res => res.text())
    .then(data => alert(data));
}
</script>

</body>
</html>
